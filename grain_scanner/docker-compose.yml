version: "3.9"

services:
  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      target: runtime
    container_name: grain_scanner_api
    ports:
      - "8000:8000"
    volumes:
      - grain_data:/app/data
      - grain_outputs:/app/outputs
      - grain_logs:/app/logs
    environment:
      - DEBUG=false
      - DATABASE_URL=sqlite+aiosqlite:////app/data/grain_scanner.db
      - UPLOAD_DIR=/app/data/uploads
      - OUTPUT_DIR=/app/outputs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Streamlit Frontend ────────────────────────────────────────────────────────
  ui:
    build:
      context: .
      target: runtime
    container_name: grain_scanner_ui
    command: streamlit run streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  grain_data:
  grain_outputs:
  grain_logs:
